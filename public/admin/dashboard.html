<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Astro — Scripts (via fetch)</title>
  <style>
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, sans-serif;
      padding: 2rem;
    }
    button {
      padding: 0.7rem 1.5rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 1.5rem;
    }
    pre {
      background: #111;
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      white-space: pre-wrap;
      color: #ccc;
    }
    .error {
      color: #f87171;
    }
  </style>
</head>
<body>
  <h1>📜 Scripts</h1>
  <button id="loadBtn">Carregar Scripts</button>
  <div id="output"></div>

  <script>
    const ADMIN_PATH = '/painel';
    const output = document.getElementById('output');
    const loadBtn = document.getElementById('loadBtn');

    loadBtn.addEventListener('click', async () => {
      output.innerHTML = 'Carregando...';
      try {
        const res = await fetch('/api/scripts', {
          credentials: 'include',
          headers: { 'Accept': 'application/json' }
        });

        if (res.status === 401) {
          window.location.href = ADMIN_PATH;
          return;
        }

        if (!res.ok) {
          output.innerHTML = `<div class="error">Erro ${res.status}: ${await res.text()}</div>`;
          return;
        }

        const scripts = await res.json();

        if (!Array.isArray(scripts) || scripts.length === 0) {
          output.innerHTML = '<p>Nenhum script criado ainda.</p>';
          return;
        }

        output.innerHTML = '<pre>' + JSON.stringify(scripts, null, 2) + '</pre>';
      } catch (err) {
        output.innerHTML = `<div class="error">Falha na requisição: ${err.message}</div>`;
      }
    });

    // Carrega automaticamente também
    loadBtn.click();
  </script>
</body>
</html>
