<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saturn Storage - Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #e0e0e0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; }
    .sidebar {
      width: 260px; background: #0f0f0f; border-right: 1px solid #1f1f1f;
      padding: 1.5rem; display: flex; flex-direction: column;
    }
    .sidebar h2 { font-weight: 800; font-size: 1.3rem; margin-bottom: 2rem; color: #fff; }
    .sidebar-nav { display: flex; flex-direction: column; gap: 0.5rem; flex: 1; }
    .sidebar-nav button {
      background: none; border: none; color: #888; padding: 0.7rem 1rem;
      text-align: left; border-radius: 8px; cursor: pointer; font-size: 0.95rem;
      transition: all 0.2s; font-family: inherit;
    }
    .sidebar-nav button:hover, .sidebar-nav button.active { background: #1a1a1a; color: #fff; }
    .logout-btn { margin-top: auto; color: #f44 !important; font-weight: 500; }
    .main { flex: 1; padding: 2rem; overflow-y: auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .header h1 { font-size: 2rem; font-weight: 700; color: #fff; }
    .actions { display: flex; gap: 1rem; flex-wrap: wrap; }
    .btn {
      padding: 0.6rem 1.2rem; border-radius: 8px; font-weight: 600; cursor: pointer;
      font-size: 0.9rem; border: none; transition: all 0.2s; font-family: inherit;
    }
    .btn-primary { background: #fff; color: #000; }
    .btn-primary:hover { background: #ddd; }
    .btn-secondary { background: #1a1a1a; color: #fff; border: 1px solid #2a2a2a; }
    .btn-secondary:hover { background: #222; }
    .btn-danger { background: #5c1a1a; color: #f88; border: 1px solid #3a1010; }
    .btn-danger:hover { background: #6b2020; }
    .btn-sm { padding: 0.35rem 0.8rem; font-size: 0.8rem; }
    .search-box { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 0.5rem 1rem; color: #fff; width: 200px; }
    .search-box:focus { outline: none; border-color: #555; }
    .table-container { background: #0f0f0f; border: 1px solid #1f1f1f; border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #1a1a1a; padding: 0.8rem; text-align: left; font-weight: 600; color: #aaa; font-size: 0.85rem; }
    td { padding: 0.8rem; border-bottom: 1px solid #1a1a1a; font-size: 0.9rem; }
    tr:last-child td { border-bottom: none; }
    .badge { padding: 0.2rem 0.7rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .online { background: #0c4a1e; color: #4ade80; }
    .offline { background: #4a0c0c; color: #f87171; }
    .tags { display: flex; gap: 0.3rem; flex-wrap: wrap; }
    .tag { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 4px; padding: 0.15rem 0.5rem; font-size: 0.75rem; }
    .loader-text { font-family: 'Fira Code', monospace; font-size: 0.8rem; color: #aaa; word-break: break-all; }
    .copy-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 1rem; transition: color 0.2s; }
    .copy-btn:hover { color: #fff; }
    .modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      justify-content: center; align-items: center; z-index: 100;
    }
    .modal.show { display: flex; }
    .modal-content {
      background: #0f0f0f; border: 1px solid #1f1f1f; border-radius: 16px;
      padding: 2rem; width: 600px; max-width: 90%; max-height: 85vh; overflow-y: auto;
    }
    .modal-content h2 { margin-bottom: 1.5rem; color: #fff; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.3rem; color: #aaa; font-size: 0.85rem; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 0.7rem; background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 8px; color: #fff; font-family: inherit; font-size: 0.9rem;
    }
    .form-group textarea { height: 250px; font-family: 'Fira Code', monospace; resize: vertical; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      outline: none; border-color: #555;
    }
    .file-upload {
      border: 2px dashed #2a2a2a; border-radius: 8px; padding: 1rem; text-align: center;
      cursor: pointer; transition: border-color 0.2s; color: #aaa;
    }
    .file-upload:hover { border-color: #fff; }
    .file-upload input[type="file"] { display: none; }
    .preview-content {
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px;
      padding: 1rem; font-family: 'Fira Code', monospace; font-size: 0.85rem;
      max-height: 400px; overflow-y: auto; white-space: pre-wrap; color: #ddd;
    }
    .tags-input { display: flex; flex-wrap: wrap; gap: 0.3rem; align-items: center; }
    .tags-input input { flex: 1; min-width: 120px; }
    .toast {
      position: fixed; bottom: 20px; right: 20px; background: #0c4a1e; color: #4ade80;
      padding: 0.8rem 1.5rem; border-radius: 8px; font-weight: 500; z-index: 200;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>🪐 Saturn</h2>
    <div class="sidebar-nav">
      <button class="active" data-tab="scripts">📜 Scripts</button>
    </div>
    <button class="logout-btn" onclick="logout()">🚪 Sair</button>
  </div>

  <div class="main">
    <div class="header">
      <h1>Scripts</h1>
      <div class="actions">
        <input type="text" class="search-box" id="searchInput" placeholder="🔍 Pesquisar..." oninput="filterScripts()">
        <select id="statusFilter" class="form-group select" style="width:auto; padding:0.5rem; background:#1a1a1a; border:1px solid #2a2a2a; color:#fff; border-radius:8px;" onchange="filterScripts()">
          <option value="">Todos</option>
          <option value="online">Online</option>
          <option value="offline">Offline</option>
        </select>
        <button class="btn btn-primary" onclick="openModal()">+ Novo Script</button>
      </div>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr><th>Nome</th><th>Status</th><th>Tags</th><th>Execuções</th><th>Loader</th><th>Ações</th></tr>
        </thead>
        <tbody id="scriptsTable"></tbody>
      </table>
    </div>
  </div>

  <!-- Modal de criação/edição -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle">Novo Script</h2>
      <form id="scriptForm">
        <input type="hidden" id="scriptId">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="scriptName" placeholder="Meu Script" required>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="scriptStatus">
            <option value="online">Online</option>
            <option value="offline">Offline</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tags (separadas por vírgula)</label>
          <input type="text" id="scriptTags" placeholder="farm, auto, combate">
        </div>
        <div class="form-group">
          <label>Conteúdo (Lua)</label>
          <textarea id="scriptContent" placeholder="-- Código Lua aqui"></textarea>
        </div>
        <div class="form-group">
          <label>Ou envie um arquivo .txt / .lua</label>
          <div class="file-upload" id="fileDropArea">
            📁 Clique ou arraste um arquivo
            <input type="file" id="fileInput" accept=".txt,.lua">
            <div id="fileName" style="margin-top:0.5rem; color:#4ade80;"></div>
          </div>
        </div>
        <div style="display:flex; gap:0.8rem; margin-top:1.5rem;">
          <button type="submit" class="btn btn-primary" style="flex:1;">Salvar</button>
          <button type="button" class="btn btn-secondary" onclick="closeModal()" style="flex:1;">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal de Preview -->
  <div id="previewModal" class="modal">
    <div class="modal-content" style="max-width:700px;">
      <h2 id="previewTitle">Preview do Script</h2>
      <div class="preview-content" id="previewContent"></div>
      <div style="margin-top:1rem; display:flex; justify-content:flex-end;">
        <button class="btn btn-secondary" onclick="closePreviewModal()">Fechar</button>
      </div>
    </div>
  </div>

  <!-- Modal de Confirmação de Exclusão -->
  <div id="deleteModal" class="modal">
    <div class="modal-content" style="max-width:400px;">
      <h2>Excluir Script</h2>
      <p>Digite <strong id="deleteScriptName"></strong> para confirmar:</p>
      <input type="text" id="deleteConfirmInput" class="form-group input" style="margin-top:0.5rem;">
      <div style="display:flex; gap:0.8rem; margin-top:1rem;">
        <button class="btn btn-danger" id="confirmDeleteBtn" disabled>Excluir</button>
        <button class="btn btn-secondary" onclick="closeDeleteModal()">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- Modal de Histórico de Versões -->
  <div id="versionsModal" class="modal">
    <div class="modal-content" style="max-width:700px;">
      <h2>Histórico de Versões</h2>
      <div id="versionsList" style="max-height:400px; overflow-y:auto;"></div>
      <div style="margin-top:1rem; display:flex; justify-content:flex-end;">
        <button class="btn btn-secondary" onclick="closeVersionsModal()">Fechar</button>
      </div>
    </div>
  </div>

  <script>
    async function api(url, options = {}) {
      const res = await fetch(url, { credentials: 'include', ...options });
      if (res.status === 401) { window.location.href = '/admin'; throw new Error('Unauthorized'); }
      return res;
    }

    let allScripts = [];

    async function loadScripts() {
      const res = await api('/api/scripts');
      allScripts = await res.json();
      renderTable(allScripts);
    }

    function renderTable(scripts) {
      const tbody = document.getElementById('scriptsTable');
      if (scripts.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#666; padding:2rem;">Nenhum script encontrado</td></tr>`;
        return;
      }
      tbody.innerHTML = scripts.map(s => {
        const loaderUrl = `${window.location.origin}/api/load/${s.id}`;
        return `
          <tr>
            <td><strong>${escapeHtml(s.name)}</strong></td>
            <td><span class="badge ${s.status}">${s.status}</span></td>
            <td><div class="tags">${(s.tags||[]).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div></td>
            <td>${s.executions || 0}</td>
            <td>
              <span class="loader-text">${loaderUrl}</span>
              <button class="copy-btn" onclick="copyLoader('${s.id}')" title="Copiar Loader">📋</button>
            </td>
            <td>
              <button class="btn btn-sm btn-secondary" onclick="previewScript('${s.id}')">👁️</button>
              <button class="btn btn-sm btn-secondary" onclick="editScript('${s.id}')">✏️</button>
              <button class="btn btn-sm btn-secondary" onclick="duplicateScript('${s.id}')">📄</button>
              <button class="btn btn-sm btn-secondary" onclick="openVersions('${s.id}')">🕒</button>
              <button class="btn btn-sm btn-danger" onclick="confirmDelete('${s.id}')">🗑️</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    function filterScripts() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const status = document.getElementById('statusFilter').value;
      const filtered = allScripts.filter(s => {
        const matchName = s.name.toLowerCase().includes(search);
        const matchStatus = !status || s.status === status;
        return matchName && matchStatus;
      });
      renderTable(filtered);
    }

    function copyLoader(id) {
      const code = `loadstring(game:HttpGet("${window.location.origin}/api/load/${id}"))()`;
      navigator.clipboard.writeText(code).then(() => showToast('✅ Loader copiado!'));
    }

    // Modal de criação/edição
    const modal = document.getElementById('modal');
    function openModal(script = null) {
      modal.classList.add('show');
      if (script) {
        document.getElementById('modalTitle').textContent = 'Editar Script';
        document.getElementById('scriptId').value = script.id;
        document.getElementById('scriptName').value = script.name;
        document.getElementById('scriptStatus').value = script.status;
        document.getElementById('scriptTags').value = (script.tags||[]).join(', ');
        document.getElementById('scriptContent').value = script.content;
      } else {
        document.getElementById('modalTitle').textContent = 'Novo Script';
        document.getElementById('scriptForm').reset();
        document.getElementById('scriptId').value = '';
      }
    }
    function closeModal() { modal.classList.remove('show'); }

    // Upload de arquivo
    document.getElementById('fileDropArea').addEventListener('click', () => document.getElementById('fileInput').click());
    document.getElementById('fileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) readFile(file);
    });
    document.getElementById('fileDropArea').addEventListener('dragover', (e) => { e.preventDefault(); e.currentTarget.style.borderColor = '#fff'; });
    document.getElementById('fileDropArea').addEventListener('dragleave', (e) => { e.currentTarget.style.borderColor = '#2a2a2a'; });
    document.getElementById('fileDropArea').addEventListener('drop', (e) => {
      e.preventDefault();
      e.currentTarget.style.borderColor = '#2a2a2a';
      const file = e.dataTransfer.files[0];
      if (file && (file.name.endsWith('.txt')||file.name.endsWith('.lua'))) readFile(file);
    });
    function readFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        document.getElementById('scriptContent').value = e.target.result;
        document.getElementById('fileName').textContent = `📄 ${file.name}`;
      };
      reader.readAsText(file);
    }

    document.getElementById('scriptForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('scriptId').value;
      const name = document.getElementById('scriptName').value.trim();
      const status = document.getElementById('scriptStatus').value;
      const tags = document.getElementById('scriptTags').value.split(',').map(t => t.trim()).filter(t => t);
      const content = document.getElementById('scriptContent').value;
      if (!name || !content) return alert('Preencha todos os campos.');
      const method = id ? 'PUT' : 'POST';
      const url = id ? `/api/scripts/${id}` : '/api/scripts';
      await api(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify({ name, status, tags, content }) });
      closeModal();
      loadScripts();
      showToast(id ? '✅ Script atualizado!' : '✅ Script criado!');
    });

    async function editScript(id) {
      const res = await api(`/api/scripts/${id}`);
      openModal(await res.json());
    }

    async function duplicateScript(id) {
      await api(`/api/scripts/${id}/duplicate`, { method: 'POST' });
      loadScripts();
      showToast('✅ Script duplicado!');
    }

    // Preview
    function previewScript(id) {
      const script = allScripts.find(s => s.id === id);
      if (!script) return;
      document.getElementById('previewTitle').textContent = `Preview: ${script.name}`;
      document.getElementById('previewContent').textContent = script.content;
      document.getElementById('previewModal').classList.add('show');
    }
    function closePreviewModal() { document.getElementById('previewModal').classList.remove('show'); }

    // Exclusão com confirmação
    let deleteTarget = null;
    function confirmDelete(id) {
      const script = allScripts.find(s => s.id === id);
      if (!script) return;
      deleteTarget = id;
      document.getElementById('deleteScriptName').textContent = script.name;
      document.getElementById('deleteConfirmInput').value = '';
      document.getElementById('confirmDeleteBtn').disabled = true;
      document.getElementById('deleteModal').classList.add('show');
    }
    document.getElementById('deleteConfirmInput').addEventListener('input', function() {
      const script = allScripts.find(s => s.id === deleteTarget);
      document.getElementById('confirmDeleteBtn').disabled = this.value !== script?.name;
    });
    document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
      if (!deleteTarget) return;
      await api(`/api/scripts/${deleteTarget}`, { method: 'DELETE' });
      closeDeleteModal();
      loadScripts();
      showToast('🗑️ Script excluído!');
    });
    function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('show'); }

    // Histórico de versões
    async function openVersions(id) {
      const res = await api(`/api/scripts/${id}/versions`);
      const versions = await res.json();
      const list = document.getElementById('versionsList');
      if (versions.length === 0) {
        list.innerHTML = '<p style="color:#666;">Nenhuma versão anterior.</p>';
      } else {
        list.innerHTML = versions.map(v => `
          <div style="border:1px solid #2a2a2a; border-radius:8px; padding:0.8rem; margin-bottom:0.5rem;">
            <strong>${escapeHtml(v.name)}</strong> <span class="badge ${v.status}">${v.status}</span>
            <div style="font-size:0.8rem; color:#888;">${new Date(v.createdAt).toLocaleString()}</div>
            <pre style="font-family:'Fira Code',monospace; font-size:0.8rem; max-height:100px; overflow-y:auto; background:#1a1a1a; padding:0.5rem; border-radius:4px; margin-top:0.5rem;">${escapeHtml(v.content)}</pre>
          </div>
        `).join('');
      }
      document.getElementById('versionsModal').classList.add('show');
    }
    function closeVersionsModal() { document.getElementById('versionsModal').classList.remove('show'); }

    function showToast(msg) {
      const toast = document.createElement('div'); toast.className = 'toast'; toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
    function logout() {
      fetch('/api/auth/logout', { method:'POST', credentials:'include' }).then(() => window.location.href='/admin');
    }
    function escapeHtml(text) {
      return String(text).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
    }

    loadScripts();
  </script>
</body>
</html>
