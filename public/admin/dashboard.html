<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saturn Storage - Dashboard</title>
  <style>
    body { background: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; display: flex; }
    .sidebar { width: 220px; background: #111; padding: 1.5rem; height: 100vh; box-sizing: border-box; }
    .sidebar h2 { margin-top: 0; }
    .sidebar button { display: block; width: 100%; background: none; border: none; color: #aaa; padding: 0.7rem; text-align: left; cursor: pointer; font-size: 1rem; border-radius: 4px; }
    .sidebar button:hover, .sidebar button.active { background: #222; color: #fff; }
    .content { flex: 1; padding: 2rem; }
    table { width: 100%; border-collapse: collapse; background: #111; border-radius: 8px; overflow: hidden; }
    th { background: #222; padding: 0.8rem; text-align: left; }
    td { padding: 0.8rem; border-bottom: 1px solid #222; }
    .badge { padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.8rem; }
    .online { background: #0c6; color: #000; }
    .offline { background: #f44; color: #fff; }
    button.action { background: #fff; color: #000; border: none; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; margin-right: 0.3rem; }
    button.danger { background: #f44; color: #fff; }
    .hidden { display: none; }
    #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
    #modal.show { display: flex; }
    .modal-content { background: #111; padding: 2rem; border-radius: 8px; width: 400px; }
    input, textarea, select { width: 100%; padding: 0.5rem; margin: 0.5rem 0; background: #222; border: 1px solid #333; color: #fff; border-radius: 4px; }
    textarea { height: 200px; font-family: monospace; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Saturn</h2>
    <button class="active" data-tab="scripts">Scripts</button>
    <button onclick="logout()">Sair</button>
  </div>

  <div class="content">
    <h1>Scripts</h1>
    <button onclick="openModal()" style="margin-bottom:1rem; padding:0.5rem 1rem; background:#fff; color:#000; border:none; border-radius:4px;">+ Novo Script</button>
    <table>
      <thead><tr><th>Nome</th><th>Status</th><th>Ações</th></tr></thead>
      <tbody id="scriptsTable"></tbody>
    </table>
  </div>

  <div id="modal">
    <div class="modal-content">
      <h2 id="modalTitle">Novo Script</h2>
      <form id="scriptForm">
        <input type="hidden" id="scriptId">
        <input type="text" id="scriptName" placeholder="Nome do script" required>
        <textarea id="scriptContent" placeholder="Conteúdo do script" required></textarea>
        <select id="scriptStatus">
          <option value="online">Online</option>
          <option value="offline">Offline</option>
        </select>
        <div style="display:flex; gap:0.5rem; margin-top:1rem;">
          <button type="submit" style="flex:1; background:#fff; color:#000; border:none; padding:0.5rem;">Salvar</button>
          <button type="button" onclick="closeModal()" style="flex:1; background:#333; color:#fff; border:none;">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    async function api(url, options = {}) {
      const res = await fetch(url, { credentials: 'include', ...options });
      if (res.status === 401) window.location.href = '/admin';
      return res;
    }

    async function loadScripts() {
      const res = await api('/api/scripts');
      const scripts = await res.json();
      const tbody = document.getElementById('scriptsTable');
      tbody.innerHTML = scripts.map(s => `
        <tr>
          <td>${s.name}</td>
          <td><span class="badge ${s.status}">${s.status}</span></td>
          <td>
            <button class="action" onclick="editScript('${s.id}')">Editar</button>
            <button class="action danger" onclick="deleteScript('${s.id}')">Excluir</button>
          </td>
        </tr>
      `).join('');
    }

    function openModal() {
      document.getElementById('modal').classList.add('show');
      document.getElementById('modalTitle').textContent = 'Novo Script';
      document.getElementById('scriptForm').reset();
      document.getElementById('scriptId').value = '';
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
    }

    async function editScript(id) {
      const res = await api(`/api/scripts/${id}`);
      const script = await res.json();
      document.getElementById('scriptId').value = script.id;
      document.getElementById('scriptName').value = script.name;
      document.getElementById('scriptContent').value = script.content;
      document.getElementById('scriptStatus').value = script.status;
      document.getElementById('modalTitle').textContent = 'Editar Script';
      document.getElementById('modal').classList.add('show');
    }

    async function deleteScript(id) {
      if (confirm('Tem certeza?')) {
        await api(`/api/scripts/${id}`, { method: 'DELETE' });
        loadScripts();
      }
    }

    document.getElementById('scriptForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('scriptId').value;
      const name = document.getElementById('scriptName').value;
      const content = document.getElementById('scriptContent').value;
      const status = document.getElementById('scriptStatus').value;

      const url = id ? `/api/scripts/${id}` : '/api/scripts';
      const method = id ? 'PUT' : 'POST';

      await api(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, content, status })
      });

      closeModal();
      loadScripts();
    });

    function logout() {
      fetch('/api/auth/logout', { method: 'POST', credentials: 'include' }).then(() => window.location.href = '/admin');
    }

    loadScripts();
  </script>
</body>
</html>
