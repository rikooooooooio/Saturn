<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astro — Diagnóstico</title>
  <style>
    body { background: #0a0a0a; color: #fff; font-family: monospace; padding: 2rem; }
    .ok { color: #10b981; }
    .error { color: #ef4444; }
    pre { background: #111; padding: 1rem; border-radius: 8px; overflow-x: auto; }
    button { margin: 1rem 0; padding: 0.5rem 1rem; background: #6366f1; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Diagnóstico do Dashboard</h1>
  <button onclick="runTests()">Executar Testes</button>
  <div id="results"></div>

  <script>
    const ADMIN_PATH = '/painel';
    const output = document.getElementById('results');

    function log(msg, type = 'info') {
      const color = type === 'ok' ? 'ok' : type === 'error' ? 'error' : '';
      output.innerHTML += `<p class="${color}">${msg}</p>`;
    }

    async function test(url, label, options = {}) {
      try {
        const res = await fetch(url, { credentials: 'include', ...options });
        const text = await res.text();
        log(`${label}: Status ${res.status}`, res.ok ? 'ok' : 'error');
        if (!res.ok) {
          log(`<pre>${escapeHtml(text.slice(0, 300))}</pre>`);
        } else {
          try {
            const json = JSON.parse(text);
            log(`Dados recebidos (${Array.isArray(json) ? json.length : Object.keys(json).length} itens)`, 'ok');
          } catch (e) {
            log(`Resposta não é JSON: ${text.slice(0, 100)}`, 'error');
          }
        }
      } catch (e) {
        log(`${label}: Erro de rede - ${e.message}`, 'error');
      }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>'"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m]);
    }

    async function runTests() {
      output.innerHTML = '';
      log('Iniciando testes...');
      log('Cookie document.cookie: ' + (document.cookie || '(vazio)'));
      await test('/api/auth/me', 'GET /api/auth/me');
      await test('/api/stats', 'GET /api/stats');
      await test('/api/scripts', 'GET /api/scripts');
      log('Testes concluídos.');
    }
  </script>
</body>
</html>
