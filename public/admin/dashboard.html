<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saturn Storage — Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Inter, sans-serif;
      background: #0b0d10;
      color: #e8eef5;
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 240px;
      background: #11151b;
      padding: 20px;
      border-right: 1px solid #222;
    }

    .sidebar h2 {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .sidebar button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background: transparent;
      border: 1px solid #333;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .sidebar button:hover {
      background: #1a1f27;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    .card {
      background: #11151b;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #222;
      margin-bottom: 15px;
    }

    h1 {
      margin: 0;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <h2>⚡ Saturn Panel</h2>
    <button onclick="loadPage('home')">Home</button>
    <button onclick="loadPage('scripts')">Scripts</button>
    <button onclick="loadPage('keys')">Keys</button>
  </div>

  <div class="main" id="content">
    <div class="card">
      <h1>🔥 Dashboard funcionando</h1>
      <p>Seu painel carregou corretamente.</p>
    </div>
  </div>

  <script>
    function loadPage(page) {
      const content = document.getElementById('content');

      if (page === 'home') {
        content.innerHTML = `
          <div class="card">
            <h1>Home</h1>
            <p>Bem-vindo ao painel Saturn.</p>
          </div>
        `;
      }

      if (page === 'scripts') {
        content.innerHTML = `
          <div class="card">
            <h1>Scripts</h1>
            <p>Aqui você vai listar scripts via API depois.</p>
          </div>
        `;
      }

      if (page === 'keys') {
        content.innerHTML = `
          <div class="card">
            <h1>Keys</h1>
            <p>Aqui você vai listar keys via API depois.</p>
          </div>
        `;
      }
    }
  </script>

</body>
</html>
