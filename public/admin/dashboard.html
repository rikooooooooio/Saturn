<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Astro — Diagnóstico XHR</title>
  <style>
    body { background: #0a0a0a; color: #fff; font-family: monospace; padding: 2rem; }
    .log { margin-bottom: 0.5rem; }
    .ok { color: #4ade80; }
    .err { color: #f87171; }
    .info { color: #a0a0a0; }
  </style>
</head>
<body>
  <h1>🔍 Diagnóstico da Requisição</h1>
  <div id="logs"></div>

  <script>
    var logs = document.getElementById('logs');
    function log(msg, cls) {
      var div = document.createElement('div');
      div.className = 'log ' + (cls || 'info');
      div.textContent = msg;
      logs.appendChild(div);
    }

    var xhr = new XMLHttpRequest();
    log('Iniciando XHR para /api/scripts');

    xhr.onreadystatechange = function() {
      log('readyState: ' + xhr.readyState + ' (status: ' + xhr.status + ')');
      if (xhr.readyState === 4) {
        log('Resposta final: status ' + xhr.status, xhr.status === 200 ? 'ok' : 'err');
        log('Resposta bruta: ' + xhr.responseText, 'info');
      }
    };

    xhr.open('GET', '/api/scripts', true);
    xhr.withCredentials = true;
    xhr.timeout = 10000;

    xhr.onerror = function() {
      log('Erro de rede (onerror disparado)', 'err');
    };

    xhr.ontimeout = function() {
      log('Timeout da requisição', 'err');
    };

    xhr.send();
  </script>
</body>
</html>
