<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astro — Login</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #1f1f1f;
      --text: #fff;
      --text2: #a0a0a0;
      --danger: #ef4444;
      --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      width: 100%;
      max-width: 380px;
    }
    .login-box h2 {
      text-align: center;
      font-size: 1.6rem;
      margin-bottom: 1.5rem;
    }
    .field {
      margin-bottom: 1.2rem;
    }
    .field label {
      display: block;
      margin-bottom: 0.4rem;
      color: var(--text2);
      font-size: 0.9rem;
    }
    .field input {
      width: 100%;
      padding: 0.8rem;
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      transition: border 0.2s;
    }
    .field input:focus {
      outline: none;
      border-color: #6366f1;
    }
    .btn {
      width: 100%;
      padding: 0.85rem;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }
    .btn:hover {
      background: #e0e0e0;
    }
    .error {
      color: var(--danger);
      text-align: center;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }
    .error.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Astro Admin</h2>
    <form method="POST" action="/api/auth/login">
      <div class="field">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" placeholder="Digite seu usuário" required autofocus>
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
      </div>
      <div class="error" id="errorMsg">Credenciais inválidas</div>
      <button type="submit" class="btn">Entrar</button>
    </form>
  </div>

  <script>
    // Exibe mensagem de erro se existir ?error=1 na URL
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === '1') {
      document.getElementById('errorMsg').classList.add('show');
    } else if (params.get('error') === 'locked') {
      const err = document.getElementById('errorMsg');
      err.textContent = 'Conta temporariamente bloqueada. Tente mais tarde.';
      err.classList.add('show');
    }
  </script>
</body>
</html>
