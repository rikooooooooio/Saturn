<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saturn Storage — Portal Administrativo</title>
  <style>
    :root { 
      --bg: #0a0a0a; 
      --surface: #131316; 
      --border: #232329; 
      --text: #ffffff; 
      --text2: #9a9a86; 
      --primary: #6366f1; 
      --danger: #ef4444; 
      --radius: 12px; 
    }

    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      position: relative;
      overflow: hidden;
    }

    /* Brilho decorativo sutil no fundo (Ambient Glow) */
    body::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: var(--primary);
      filter: blur(150px);
      opacity: 0.15;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
    }

    .login-container {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2.5rem 2rem;
      border-radius: 16px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      z-index: 1;
      backdrop-filter: blur(8px);
    }

    .brand-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand-header h2 {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      margin-bottom: 0.25rem;
    }

    .brand-header p {
      color: var(--text2);
      font-size: 0.85rem;
    }

    .input-group {
      margin-bottom: 1.2rem;
    }

    .input-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: #0d0d10;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    button {
      width: 100%;
      padding: 0.85rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover {
      opacity: 0.95;
    }

    button:active {
      transform: scale(0.98);
    }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--danger);
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.75rem;
      border-radius: 8px;
      display: none;
      margin-bottom: 1.2rem;
      text-align: center;
    }

    .loading {
      opacity: 0.5;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="brand-header">
      <h2>🪐 Saturn</h2>
      <p>Node Infrastructure Management</p>
    </div>

    <div class="error" id="error">Credenciais inválidas</div>

    <form id="loginForm">
      <div class="input-group">
        <label for="username">Usuário</label>
        <input type="text" id="username" placeholder="Digite seu usuário" required autocomplete="username">
      </div>

      <div class="input-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>

      <button type="submit" id="btn">Entrar no Painel</button>
    </form>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const error = document.getElementById("error");
    const btn = document.getElementById("btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      error.style.display = "none";
      btn.innerText = "Autenticando...";
      btn.classList.add("loading");

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ username, password })
        });

        const data = await res.json().catch(() => null);

        if (!res.ok) {
          throw new Error(data?.error || "Falha na autenticação");
        }

        // 🔥 Sucesso: Redireciona de forma segura usando o caminho retornado pela API dinâmica
        if (data && data.redirectPath) {
          window.location.href = data.redirectPath;
        } else {
          // Fallback de contingência caso a rota dinâmica não venha preenchida
          window.location.href = "/";
        }

      } catch (err) {
        error.innerText = err.message || "Erro de conexão com o servidor.";
        error.style.display = "block";
        btn.innerText = "Entrar no Painel";
        btn.classList.remove("loading");
      }
    });
  </script>
</body>
</html>
