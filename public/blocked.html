<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found</title>
  <style>
    body {
      background: #fff;
      color: #333;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container {
      max-width: 500px;
      padding: 2rem;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      color: #888;
      font-weight: 400;
    }
    p {
      color: #666;
      font-size: 1rem;
      line-height: 1.5;
    }
    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 1.5rem 0;
    }
    .server-info {
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>A página que você está procurando não foi encontrada.</p>
    <p>Verifique o endereço digitado ou volte para a página inicial.</p>
    <hr>
    <div class="server-info">nginx/1.18.0 (Ubuntu)</div>
  </div>
</body>
</html>
