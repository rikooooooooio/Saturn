<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saturn — Scripts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #1f1f1f;
      --text: #fff;
      --text2: #a0a0a0;
      --online: #10b981;
      --offline: #ef4444;
      --maintenance: #f59e0b;
      --development: #6366f1;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .navbar {
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .navbar h1 {
      font-weight: 800;
      font-size: 1.3rem;
      letter-spacing: -0.5px;
    }
    .hero {
      text-align: center;
      padding: 3rem 2rem 1rem;
    }
    .hero h2 {
      font-size: 2.5rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #fff, #888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p {
      color: var(--text2);
      margin-bottom: 2rem;
      font-size: 1.1rem;
    }

    /* Grid de Scripts */
    .scripts-grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .script-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .script-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
    }
    .card-image {
      width: 100%;
      height: 160px;
      background-size: cover;
      background-position: center;
      background-color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 3rem;
      font-weight: 200;
    }
    .card-body {
      padding: 1rem 1.2rem;
    }
    .card-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .status-icon {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-online .status-dot { background: var(--online); }
    .status-offline .status-dot { background: var(--offline); }
    .status-maintenance .status-dot { background: var(--maintenance); }
    .status-development .status-dot { background: var(--development); }

    .card-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.8rem;
    }
    .btn-sm {
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: #fff;
      color: #000;
      transition: 0.2s;
    }
    .btn-sm:hover { background: #e0e0e0; }

    footer {
      margin-top: auto;
      padding: 1.5rem;
      text-align: center;
      color: #333;
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
    }
    .admin-link {
      position: fixed;
      bottom: 10px;
      right: 10px;
      opacity: 0;
      transition: opacity 0.3s;
      font-size: 0.7rem;
      color: #222;
    }
    .admin-link:hover { opacity: 1; }
  </style>
</head>
<body>
  <nav class="navbar">
    <h1>Saturn</h1>
  </nav>

  <section class="hero">
    <h2>Scripts Disponíveis</h2>
    <p>Escolha um script, copie o loader e execute no seu jogo.</p>
  </section>

  <!-- Grade de scripts -->
  <div class="scripts-grid" id="scriptsGrid">
    <!-- Preenchido dinamicamente -->
  </div>

  <footer>
    <p>Saturn &copy; 2026 — Scripts para Roblox</p>
  </footer>

  <a href="/admin" class="admin-link">.</a>

  <script>
    async function loadPublicScripts() {
      try {
        // Tenta buscar da API (precisa de rota pública, veja instruções abaixo)
        const res = await fetch('/api/scripts');
        if (!res.ok) throw new Error('API não disponível');
        const scripts = await res.json();
        renderScripts(scripts);
      } catch (e) {
        // Dados de exemplo enquanto a API não está pronta
        const demoScripts = [
          { id: '1', name: 'Blox Fruits AutoFarm', status: 'online', image: '', short_id: 'abc123' },
          { id: '2', name: 'Pet Simulator X', status: 'online', image: '', short_id: 'def456' },
          { id: '3', name: 'Jailbreak ESP', status: 'offline', image: '', short_id: 'ghi789' },
          { id: '4', name: 'Arsenal Aimbot', status: 'maintenance', image: '', short_id: 'jkl012' }
        ];
        renderScripts(demoScripts);
      }
    }

    function renderScripts(scripts) {
      const grid = document.getElementById('scriptsGrid');
      grid.innerHTML = scripts.map(s => {
        const statusClass = `status-${s.status}`;
        const statusLabel = { online: 'Online', offline: 'Offline', maintenance: 'Manutenção', development: 'Desenvolvimento' }[s.status] || 'Online';
        const bgImage = s.image ? `style="background-image:url(${s.image})"` : '';
        return `
          <div class="script-card">
            <div class="card-image" ${bgImage}>
              ${!s.image ? '🎮' : ''}
            </div>
            <div class="card-body">
              <div class="card-title">
                <span>${escapeHtml(s.name)}</span>
                <span class="status-icon ${statusClass}">
                  <span class="status-dot"></span> ${statusLabel}
                </span>
              </div>
              <div class="card-actions">
                <button class="btn-sm" onclick="copyLoaderDirect('${s.id}')">Copiar Loader</button>
                <button class="btn-sm" onclick="window.location.href='/get/${s.id}'">Detalhes</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function copyLoaderDirect(id) {
      const loader = `loadstring(game:HttpGet("${location.origin}/api/load/${id}"))()`;
      navigator.clipboard.writeText(loader).then(() => alert('Loader copiado!'));
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[m]));
    }

    loadPublicScripts();
  </script>
</body>
</html>
