<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saturn — Script Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1f1f1f;
      --text: #ffffff;
      --text-secondary: #a0a0a0;
      --primary: #6366f1;
      --online: #10b981;
      --offline: #ef4444;
      --maintenance: #f59e0b;
      --development: #8888ff;
      --radius: 16px;
      --radius-sm: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      opacity: 0;
      animation: bodyFadeIn 0.6s ease forwards;
    }
    @keyframes bodyFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .navbar {
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: slideDown 0.5s ease forwards;
    }
    @keyframes slideDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .navbar h1 { font-weight: 800; font-size: 1.3rem; letter-spacing: -0.5px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.2rem;
      border-radius: var(--radius-sm);
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: #fff;
      color: #000;
      transition: 0.2s;
      font-size: 0.85rem;
    }
    .btn-outline { background: transparent; border: 1px solid #333; color: #fff; }
    .btn-outline:hover { border-color: #fff; background: rgba(255,255,255,0.05); }

    .hero {
      text-align: center;
      padding: 3rem 2rem 1rem;
      animation: slideUp 0.6s ease 0.1s forwards;
      opacity: 0;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .hero h2 {
      font-size: 2.5rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #fff, #888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p { color: var(--text-secondary); margin-bottom: 2rem; font-size: 1.1rem; }

    /* Seção de scripts */
    .scripts-section { max-width: 700px; margin: 0 auto; padding: 2rem; }
    .section-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      animation: slideUp 0.5s ease 0.2s forwards;
      opacity: 0;
    }
    .scripts-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* Card */
    .script-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      opacity: 0;
      transform: translateY(40px);
      animation: cardRise 0.5s ease forwards;
      overflow: hidden;
    }
    .script-card:nth-child(1) { animation-delay: 0.15s; }
    .script-card:nth-child(2) { animation-delay: 0.25s; }
    .script-card:nth-child(3) { animation-delay: 0.35s; }
    .script-card:nth-child(4) { animation-delay: 0.45s; }
    .script-card:nth-child(5) { animation-delay: 0.55s; }
    .script-card:nth-child(6) { animation-delay: 0.65s; }
    .script-card:nth-child(7) { animation-delay: 0.75s; }
    .script-card:nth-child(8) { animation-delay: 0.85s; }

    @keyframes cardRise {
      to { transform: translateY(0); opacity: 1; }
    }
    .script-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 35px rgba(0,0,0,0.6), 0 0 20px rgba(99,102,241,0.15);
      border-color: #333;
    }
    .script-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
      transition: left 0.6s;
      pointer-events: none;
    }
    .script-card:hover::after {
      left: 100%;
    }

    .card-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-sm);
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .card-icon svg {
      width: 24px;
      height: 24px;
      stroke: var(--text-secondary);
      fill: none;
      stroke-width: 2;
    }
    .card-info {
      flex: 1;
      min-width: 0;
    }
    .card-name {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }
    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
      align-items: center;
    }
    .card-meta-item {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    .card-meta-item svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }
    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-weight: 600;
      font-size: 0.75rem;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-online .status-dot { background: var(--online); }
    .status-offline .status-dot { background: var(--offline); }
    .status-maintenance .status-dot { background: var(--maintenance); }
    .status-development .status-dot { background: var(--development); }

    .card-arrow {
      flex-shrink: 0;
      transition: transform 0.3s;
    }
    .script-card:hover .card-arrow {
      transform: translateX(4px);
    }
    .card-arrow svg {
      width: 20px;
      height: 20px;
      stroke: var(--text-secondary);
      fill: none;
      stroke-width: 2;
    }

    footer {
      margin-top: auto;
      padding: 1.5rem;
      text-align: center;
      color: #333;
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
      animation: slideUp 0.5s ease 0.5s forwards;
      opacity: 0;
    }

    @media (max-width: 768px) {
      .hero h2 { font-size: 2rem; }
      .script-card { padding: 1.2rem; }
      .card-icon { width: 40px; height: 40px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <h1>Saturn</h1>
    <a href="/status" class="btn btn-outline">Status</a>
  </nav>

  <section class="hero">
    <h2>Scripts Profissionais</h2>
    <p>Escolha um script, veja os detalhes e execute no seu jogo favorito.</p>
  </section>

  <section class="scripts-section">
    <h2 class="section-title">Scripts Disponíveis</h2>
    <div class="scripts-list" id="scriptsList"></div>
  </section>

  <footer>
    <p>Saturn &copy; 2026 — Scripts para Roblox</p>
  </footer>

  <script>
    // Dados mockados de exemplo
    const scriptsMock = [
      { id: 'abc123', name: 'Blox Fruits', status: 'online', version: '2.1.0', updated_at: '2026-06-20' },
      { id: 'def456', name: 'Pet Simulator X', status: 'online', version: '1.5.3', updated_at: '2026-06-18' },
      { id: 'ghi789', name: 'Jailbreak', status: 'offline', version: '3.0.1', updated_at: '2026-05-12' },
      { id: 'jkl012', name: 'Arsenal', status: 'maintenance', version: '4.2.0', updated_at: '2026-06-22' },
      { id: 'mno345', name: 'Adopt Me!', status: 'online', version: '1.0.0', updated_at: '2026-06-01' },
      { id: 'pqr678', name: 'Murder Mystery 2', status: 'development', version: '2.0.0-beta', updated_at: '2026-06-25' }
    ];

    // Ícones SVG para cada status
    const statusIcons = {
      online: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="7 12 11 15 17 9"/></svg>`,
      offline: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
      maintenance: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
      development: `<svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`
    };

    function renderScripts(scripts) {
      const list = document.getElementById('scriptsList');
      list.innerHTML = scripts.map(s => {
        const statusLabel = { online: 'Online', offline: 'Offline', maintenance: 'Manutenção', development: 'Desenvolvimento' }[s.status] || 'Online';
        const statusClass = `status-${s.status}`;
        return `
          <div class="script-card" onclick="window.location.href='/get/${s.id}'">
            <div class="card-icon">
              <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <div class="card-info">
              <div class="card-name">${escapeHtml(s.name)}</div>
              <div class="card-meta">
                <span class="card-meta-item">
                  <svg viewBox="0 0 24 24"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>
                  v${escapeHtml(s.version)}
                </span>
                <span class="card-meta-item">
                  <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                  ${formatDate(s.updated_at)}
                </span>
                <span class="status-indicator ${statusClass}">
                  <span class="status-dot"></span> ${statusLabel}
                </span>
              </div>
            </div>
            <div class="card-arrow">
              <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
          </div>
        `;
      }).join('');
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      const day = String(d.getDate()).padStart(2, '0');
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const year = String(d.getFullYear()).slice(-2);
      return `${day}/${month}/${year}`;
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>'"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
    }

    renderScripts(scriptsMock);
  </script>
</body>
</html>
