<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saturn Panel - Script Hub</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="data:,">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fira+Code&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex flex-col bg-black text-white">
  <nav class="navbar">
    <span class="navbar-brand">SATURN PANEL</span>
    <div class="navbar-actions">
      <a href="/admin" class="btn btn-primary btn-sm">Admin</a>
    </div>
  </nav>

  <main class="hero flex-1">
    <div class="hero-content">
      <div class="hero-badge">Welcome to</div>
      <h1 class="hero-title">SATURN PANEL</h1>
      <p class="hero-subtitle">The ultimate script library. Fast, secure, always online.</p>

      <div class="code-box">
        <div class="code-header">
          <span class="code-dot"></span>
          <span class="code-dot"></span>
          <span class="code-dot"></span>
        </div>
        <code>
          <span style="color:#fff">Key</span> = <span style="color:#a0a0a0">"SATURN-XXXX-XXXX-XXXX"</span><br><br>
          <span style="color:#fff">loadstring</span>(<span style="color:#fff">game:HttpGet</span>(<span style="color:#666">"https://saturnpanel.space/api/load/</span><span style="color:#fff">scriptId</span><span style="color:#666">?key="</span> .. <span style="color:#fff">Key</span>))()
        </code>
      </div>

      <div class="flex gap-2 justify-center">
        <button class="btn btn-primary" onclick="copyLoader()">Copy Loader</button>
        <a href="/admin" class="btn btn-secondary">Admin Panel</a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div>&copy; 2026 Saturn Panel. Built for script enthusiasts.</div>
  </footer>

  <script>
    function copyLoader() {
      const code = 'Key = "SATURN-XXXX-XXXX-XXXX"\nloadstring(game:HttpGet("https://saturnpanel.space/api/load/scriptId?key=" .. Key))()';
      navigator.clipboard.writeText(code).then(() => alert('Loader copied!'));
    }
  </script>
</body>
</html>
