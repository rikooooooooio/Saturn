<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saturn Panel - Admin</title>
  <link rel="stylesheet" href="/style.css">
  <link rel='icon' href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><ellipse cx="16" cy="16" rx="14" ry="5" fill="none" stroke="%23d9a94e" stroke-width="2" transform="rotate(-20 16 16)"/><circle cx="16" cy="16" r="8" fill="%23d9a94e"/></svg>'>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="flex min-h-screen bg-black text-white">

  <!-- mobile drawer toggle (pure CSS, no JS) -->
  <input type="checkbox" id="menuToggle" class="menu-toggle">
  <label for="menuToggle" class="menu-toggle-label" aria-label="Abrir menu"><span></span></label>
  <label for="menuToggle" class="sidebar-backdrop"></label>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo"><span class="brand-mark"></span>SATURN</div>
    <nav class="sidebar-nav">
      <button class="sidebar-link active" data-tab="dashboard">Dashboard</button>
      <button class="sidebar-link" data-tab="scripts">Scripts</button>
      <button class="sidebar-link" data-tab="keys">Keys</button>
      <button class="sidebar-link" data-tab="settings">Settings</button>
    </nav>
    <div class="sidebar-footer">
      <button id="logoutBtn" class="sidebar-logout">Logout</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content flex-1">

    <!-- Login section -->
    <div id="loginSection" class="login-container hidden">
      <h2 class="login-title">Admin Login</h2>
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-input" placeholder="admin@saturn.com" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password">
        </div>
        <p id="loginError" class="form-error">Invalid credentials</p>
        <button type="submit" class="btn btn-primary btn-block mt-2">Login</button>
      </form>
    </div>

    <!-- App section -->
    <div id="appSection" class="hidden">

      <!-- Dashboard Tab -->
      <div id="tab-dashboard" class="tab-content">
        <h2 class="card-header" style="font-size:2rem;">Dashboard</h2>
        <div class="stats-grid mt-4">
          <div class="stat-card"><div class="stat-label">Total Scripts</div><div class="stat-value" id="statScripts">0</div></div>
          <div class="stat-card"><div class="stat-label">Total Keys</div><div class="stat-value" id="statKeys">0</div></div>
          <div class="stat-card"><div class="stat-label">Active Keys</div><div class="stat-value" id="statActiveKeys">0</div></div>
          <div class="stat-card"><div class="stat-label">Online Scripts</div><div class="stat-value" id="statOnlineScripts">0</div></div>
        </div>
      </div>

      <!-- Scripts Tab -->
      <div id="tab-scripts" class="tab-content hidden">
        <div class="flex justify-between items-center mb-4">
          <h2 class="card-header" style="font-size:2rem;">Scripts</h2>
          <button id="newScriptBtn" class="btn btn-primary">+ New Script</button>
        </div>
        <div class="table-container">
          <table class="table">
            <thead><tr><th>Name</th><th>Status</th><th>Loader</th><th>Actions</th></tr></thead>
            <tbody id="scriptsTable"></tbody>
          </table>
        </div>
      </div>

      <!-- Keys Tab -->
      <div id="tab-keys" class="tab-content hidden">
        <div class="flex justify-between items-center mb-4">
          <h2 class="card-header" style="font-size:2rem;">Keys</h2>
          <button id="newKeyBtn" class="btn btn-primary">+ Generate Key</button>
        </div>
        <div class="table-container">
          <table class="table">
            <thead><tr><th>Key</th><th>Expires</th><th>HWID</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="keysTable"></tbody>
          </table>
        </div>
      </div>

      <!-- Settings Tab -->
      <div id="tab-settings" class="tab-content hidden">
        <h2 class="card-header" style="font-size:2rem;">Settings</h2>
        <p class="text-sm" style="color:var(--text-dim);">System configuration panel coming soon.</p>
      </div>

    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="modal-overlay">
    <div class="modal">
      <h3 id="modalTitle" class="modal-title"></h3>
      <div id="modalContent"></div>
      <div class="modal-actions">
        <button id="modalCancel" class="btn btn-secondary">Cancel</button>
        <button id="modalSave" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
