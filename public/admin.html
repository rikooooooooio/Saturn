<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saturn Panel - Admin</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="data:,">
</head>
<body class="bg-black text-white flex min-h-screen">
  <!-- Sidebar -->
  <aside class="w-64 bg-zinc-950 border-r border-zinc-800 flex flex-col p-6 min-h-screen">
    <h2 class="text-xl font-bold mb-10">SATURN</h2>
    <nav class="flex flex-col gap-4">
      <button class="tab-link text-left py-2 px-3 rounded-lg text-zinc-400 hover:text-white hover:bg-zinc-900 transition" data-tab="dashboard">Dashboard</button>
      <button class="tab-link text-left py-2 px-3 rounded-lg text-zinc-400 hover:text-white hover:bg-zinc-900 transition" data-tab="scripts">Scripts</button>
      <button class="tab-link text-left py-2 px-3 rounded-lg text-zinc-400 hover:text-white hover:bg-zinc-900 transition" data-tab="keys">Keys</button>
      <button class="tab-link text-left py-2 px-3 rounded-lg text-zinc-400 hover:text-white hover:bg-zinc-900 transition" data-tab="settings">Settings</button>
    </nav>
    <div class="mt-auto">
      <button id="logoutBtn" class="text-red-400 hover:text-red-300 transition">Logout</button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="flex-1 p-8">
    <!-- Login form (hidden if authenticated) -->
    <div id="loginSection" class="max-w-md mx-auto mt-20 hidden">
      <h2 class="text-2xl font-bold mb-6">Admin Login</h2>
      <form id="loginForm">
        <input type="email" id="email" placeholder="Email" class="w-full p-3 mb-3 bg-zinc-900 border border-zinc-700 rounded-lg text-white">
        <input type="password" id="password" placeholder="Password" class="w-full p-3 mb-4 bg-zinc-900 border border-zinc-700 rounded-lg text-white">
        <p id="loginError" class="text-red-500 mb-3 hidden">Invalid credentials</p>
        <button type="submit" class="w-full bg-white text-black font-semibold py-3 rounded-lg hover:bg-gray-200 transition">Login</button>
      </form>
    </div>

    <!-- Dashboard (hidden until authenticated) -->
    <div id="appSection" class="hidden">
      <div id="tab-dashboard" class="tab-content">
        <h2 class="text-3xl font-bold mb-8">Dashboard</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
          <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6"><div class="text-zinc-400 text-sm">Total Scripts</div><div class="text-3xl font-bold" id="statScripts">0</div></div>
          <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6"><div class="text-zinc-400 text-sm">Total Keys</div><div class="text-3xl font-bold" id="statKeys">0</div></div>
          <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6"><div class="text-zinc-400 text-sm">Active Keys</div><div class="text-3xl font-bold" id="statActiveKeys">0</div></div>
          <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6"><div class="text-zinc-400 text-sm">Online Scripts</div><div class="text-3xl font-bold" id="statOnlineScripts">0</div></div>
        </div>
      </div>

      <div id="tab-scripts" class="tab-content hidden">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-3xl font-bold">Scripts</h2>
          <button id="newScriptBtn" class="bg-white text-black px-4 py-2 rounded-lg font-semibold hover:bg-gray-200">+ New Script</button>
        </div>
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden">
          <table class="w-full text-left">
            <thead class="border-b border-zinc-800"><tr><th class="p-4 text-zinc-400">Name</th><th class="p-4 text-zinc-400">Status</th><th class="p-4 text-zinc-400">Loader</th><th class="p-4 text-zinc-400">Actions</th></tr></thead>
            <tbody id="scriptsTable"></tbody>
          </table>
        </div>
      </div>

      <div id="tab-keys" class="tab-content hidden">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-3xl font-bold">Keys</h2>
          <button id="newKeyBtn" class="bg-white text-black px-4 py-2 rounded-lg font-semibold hover:bg-gray-200">+ Generate Key</button>
        </div>
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden">
          <table class="w-full text-left">
            <thead class="border-b border-zinc-800"><tr><th class="p-4 text-zinc-400">Key</th><th class="p-4 text-zinc-400">Expires</th><th class="p-4 text-zinc-400">HWID</th><th class="p-4 text-zinc-400">Status</th><th class="p-4 text-zinc-400">Actions</th></tr></thead>
            <tbody id="keysTable"></tbody>
          </table>
        </div>
      </div>

      <div id="tab-settings" class="tab-content hidden">
        <h2 class="text-3xl font-bold mb-6">Settings</h2>
        <p class="text-zinc-400">System configuration will be here.</p>
      </div>
    </div>
  </main>

  <div id="modal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden z-50">
    <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-8 w-full max-w-xl max-h-[90vh] overflow-auto">
      <h3 id="modalTitle" class="text-xl font-bold mb-4"></h3>
      <div id="modalContent"></div>
      <div class="flex justify-end gap-3 mt-6">
        <button id="modalCancel" class="px-4 py-2 border border-zinc-700 rounded-lg">Cancel</button>
        <button id="modalSave" class="px-4 py-2 bg-white text-black rounded-lg font-semibold">Save</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
